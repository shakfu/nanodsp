site_name: nanodsp
site_description: High-performance Python DSP toolkit built on C++ libraries via nanobind
site_url: https://shakfu.github.io/nanodsp
repo_url: https://github.com/shakfu/nanodsp
repo_name: shakfu/nanodsp

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source
            docstring_style: numpy
            docstring_section_style: spacy
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Algorithm Guide: guide.md
  - CLI: cli.md
  - API Reference:
    - api/index.md
    - AudioBuffer: api/buffer.md
    - I/O: api/io.md
    - Operations: api/ops.md
    - Effects:
      - api/effects/index.md
      - Filters: api/effects/filters.md
      - DaisySP: api/effects/daisysp.md
      - Dynamics: api/effects/dynamics.md
      - Saturation: api/effects/saturation.md
      - Reverb: api/effects/reverb.md
      - Composed: api/effects/composed.md
    - Spectral: api/spectral.md
    - Synthesis: api/synthesis.md
    - Analysis: api/analysis.md
    - Streaming: api/stream.md
